name: Build & Release

on:
  push:
    tags:
      - "v*"  # 推送 v 开头的 tag 时触发（如 v1.2.1）

permissions:
  contents: write  # 创建 Release 需要写权限

jobs:
  build:
    name: Build Windows Installer (Nuitka)
    runs-on: windows-latest

    steps:
      # ─── 基础环境 ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      # ─── 提取版本号 ────────────────────────────────────────
      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          echo "Version: $version"

      # ─── 安装依赖 ──────────────────────────────────────────
      - name: Install dependencies
        run: uv sync

      # ─── MSVC 环境（让 Nuitka 使用 cl，而非下载 MinGW）──────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # ─── 缓存 Nuitka 编译产物，加速后续构建 ────────────────
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/Nuitka/Nuitka
          key: nuitka-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            nuitka-${{ runner.os }}-

      # ─── Nuitka 编译（standalone 单目录）───────────────────
      - name: Build with Nuitka
        shell: pwsh
        run: |
          uv run python -m nuitka `
            --standalone `
            --output-dir="output" `
            --output-filename="simple_load.exe" `
            --windows-icon-from-ico="static/app_icon.ico" `
            --company-name="gulei" `
            --product-name="simple_load" `
            --product-version=$env:APP_VERSION `
            --file-version=$env:APP_VERSION `
            --file-description="Load Calculator" `
            --include-package=app_simpleLoad `
            --include-package=my_websockets `
            --include-package=fastapi `
            --include-package=uvicorn `
            --include-package=websockets `
            --include-package=anyio `
            --include-package=rich `
            --include-package=numpy `
            --include-package=pandas `
            --include-package=polars `
            --include-package=openpyxl `
            --assume-yes-for-downloads `
            --remove-output `
            --progress-bar=none `
            main.py

      # ─── 重命名产物目录 main.dist -> simple_load ───────────
      - name: Rename dist directory
        shell: pwsh
        run: |
          if (Test-Path "output/simple_load") { Remove-Item -Recurse -Force "output/simple_load" }
          Move-Item "output/main.dist" "output/simple_load"

      # ─── Inno Setup 打包 ───────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      # 中文语言包随仓库自带（installer/ChineseSimplified.isl），不再依赖外部下载
      - name: Install Chinese language file for Inno Setup
        shell: pwsh
        run: |
          $langDir = "${env:ProgramFiles(x86)}\Inno Setup 6\Languages"
          Copy-Item "installer\ChineseSimplified.isl" "$langDir\ChineseSimplified.isl" -Force
          Write-Host "Copied ChineseSimplified.isl to $langDir"

      - name: Build installer with Inno Setup
        run: iscc inno_setup.iss

      # ─── 上传到 Release ────────────────────────────────────
      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: software/simple_load-${{ env.APP_VERSION }}.exe
          generate_release_notes: true
